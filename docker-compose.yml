services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_DEBUG=1
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    env_file:
      - ./backend/.env

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=/api/v1

  documentation:
    build: 
      context: ./doc
      dockerfile: Dockerfile
    container_name: todo-docs
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./doc:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - OPENAPI_SPEC_URL=http://backend:5000/apispec.json
