services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    # Mesmas variáveis do Flask local: tudo vem de backend/.env (não sobrescrever FLASK_* / CORS_* / SECRET_* aqui).
    env_file:
      - ./backend/.env

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      # Não definir VITE_API_BASE_URL aqui: o código já prefixa /api/v1 em cada fetch.
      # Se fosse /api/v1, viraria /api/v1/api/v1/... no proxy (404).
      # Proxy do Vite dentro da rede Docker → Flask em backend:5000
      - VITE_DEV_PROXY_TARGET=http://backend:5000

  documentation:
    build: 
      context: ./documentation
      dockerfile: Dockerfile
    container_name: todo-docs
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./documentation:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
